name: neulsw

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: neulsw-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: neulsw-backend-dev
    restart: unless-stopped
    ports:
      - "5000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sanity-studio:
    build:
      context: ./sanity-studio
      dockerfile: Dockerfile.dev
    container_name: neulsw-sanity-studio-dev
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      - ./sanity-studio:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - SANITY_STUDIO_PROJECT_ID=hlql019b
      - SANITY_STUDIO_DATASET=production

