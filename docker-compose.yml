services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kyunghee-frontend
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kyunghee-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s





